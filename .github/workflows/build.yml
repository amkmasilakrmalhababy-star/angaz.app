name: Flutter Auto Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      # التعديل السحري: نقل ملف كود إنجاز مؤقتاً لحمايته، ثم إعادته بعد توليد بنية الأندرويد
      - name: Generate Android Structure Safely
        run: |
          mv lib/main.dart ./main_backup.dart
          flutter create . --platforms=android --project-name=enjaz_app --overwrite
          rm lib/main.dart
          mv ./main_backup.dart lib/main.dart

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: Enjaz-App
          path: build/app/outputs/flutter-apk/app-release.apk
