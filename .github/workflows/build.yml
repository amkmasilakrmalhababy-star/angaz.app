name: Flutter Auto Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      # فحص ذكي: أخذ نسخة احتياطية فقط إذا كان الملف موجوداً بالفعل لمنع فشل السكريبت
      - name: Generate Android Structure Safely
        run: |
          if [ -f "lib/main.dart" ]; then
            cp lib/main.dart ./main_backup.dart
          fi
          
          flutter create . --platforms=android --overwrite
          
          if [ -f "./main_backup.dart" ]; then
            mkdir -p lib
            mv ./main_backup.dart lib/main.dart
          fi

          # تأكيد وجود مجلد lib وملف رئيسي لتجنب أخطاء الفولدرات الفارغة
          mkdir -p lib
          if [ ! -f "lib/main.dart" ]; then
            echo "void main() {}" > lib/main.dart
          fi

          # إصلاح أي تعارض تلقائي في ملف الإعدادات
          sed -i 's/name: .*/name: angaz_app/' pubspec.yaml

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: Enjaz-App
          path: build/app/outputs/flutter-apk/app-release.apk
